<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Material Stock Management</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    color:#333;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    margin-bottom:20px;
}

input,select,button{
    padding:8px;
    margin:5px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    opacity:0.9;
}

.deleteBtn{
    background:red;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

.stock{
    background:#d4edda;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Material Stock Management</h1>

<div class="container">

<label>Date :</label>
<input type="date" id="date">

<select id="material">

<option value="0">HRC Sheet 9.5*32 M10</option>
<option value="1">HRC Sheet 6*28 WB</option>
<option value="2">HRC Sheet 5*58/5*22 Spcr</option>

</select>

<select id="type">

<option value="IN">Material IN (KG)</option>
<option value="OUT">Material OUT (Pieces)</option>

</select>

<input type="number" id="value" placeholder="Enter Value">

<button onclick="addEntry()">Add Entry</button>

<button onclick="downloadCSV()">Download Excel CSV</button>

</div>


<table>

<thead>

<tr>

<th>Date</th>
<th>Material</th>
<th>Type</th>
<th>IN KG</th>
<th>OUT Pieces</th>
<th>OUT KG</th>
<th>Balance Pieces</th>
<th>Balance KG</th>
<th>Action</th>

</tr>

</thead>

<tbody id="entryTable"></tbody>

</table>


<script>

const materials = [

{
name:"HRC Sheet 9.5*32 M10",
netWeight:0.068
},

{
name:"HRC Sheet 6*28 WB",
netWeight:0.060
},

{
name:"HRC Sheet 5*58/5*22 Spcr",
netWeight:0.050
}

];

let stock = JSON.parse(localStorage.getItem("stock")) || {

0:{kg:0,pieces:0},
1:{kg:0,pieces:0},
2:{kg:0,pieces:0}

};

let entries = JSON.parse(localStorage.getItem("entries")) || [];

loadTable();


// ADD ENTRY

function addEntry(){

let date = document.getElementById("date").value;

let materialIndex = document.getElementById("material").value;

let type = document.getElementById("type").value;

let value = parseFloat(document.getElementById("value").value);

if(date==""){

alert("Please Select Date");
return;

}

if(!value || value<=0){

alert("Please Enter Valid Value");
return;

}

let material = materials[materialIndex];

let inKg = 0;
let outPieces = 0;
let outKg = 0;

if(type=="IN"){

inKg = value;

let pieces = Math.floor(inKg / material.netWeight);

stock[materialIndex].kg += inKg;

stock[materialIndex].pieces += pieces;

}

else{

outPieces = value;

outKg = outPieces * material.netWeight;

stock[materialIndex].kg -= outKg;

stock[materialIndex].pieces -= outPieces;

}

let entry = {

date:date,
material:material.name,
type:type,
inKg:inKg.toFixed(3),
outPieces:outPieces,
outKg:outKg.toFixed(3),
balancePieces:stock[materialIndex].pieces,
balanceKg:stock[materialIndex].kg.toFixed(3)

};

entries.push(entry);

localStorage.setItem("entries",JSON.stringify(entries));

localStorage.setItem("stock",JSON.stringify(stock));

loadTable();

document.getElementById("value").value="";

}


// LOAD TABLE

function loadTable(){

let table = document.getElementById("entryTable");

table.innerHTML="";

entries.forEach((e,index)=>{

table.innerHTML += `

<tr>

<td>${e.date}</td>
<td>${e.material}</td>
<td>${e.type}</td>
<td>${e.inKg}</td>
<td>${e.outPieces}</td>
<td>${e.outKg}</td>
<td class="stock">${e.balancePieces}</td>
<td class="stock">${e.balanceKg}</td>

<td>

<button class="deleteBtn"
onclick="deleteEntry(${index})">

Delete

</button>

</td>

</tr>

`;

});

}


// DELETE ENTRY

function deleteEntry(index){

let confirmDelete = confirm("Delete This Entry ?");

if(confirmDelete){

entries.splice(index,1);

recalculateStock();

loadTable();

}

}


// RECALCULATE STOCK AFTER DELETE

function recalculateStock(){

stock = {

0:{kg:0,pieces:0},
1:{kg:0,pieces:0},
2:{kg:0,pieces:0}

};

entries.forEach(e=>{

let materialIndex = materials.findIndex(
m => m.name === e.material
);

let material = materials[materialIndex];

if(e.type=="IN"){

stock[materialIndex].kg += parseFloat(e.inKg);

stock[materialIndex].pieces += Math.floor(
parseFloat(e.inKg) / material.netWeight
);

}

else{

stock[materialIndex].kg -= parseFloat(e.outKg);

stock[materialIndex].pieces -= parseFloat(e.outPieces);

}

e.balancePieces = stock[materialIndex].pieces;

e.balanceKg = stock[materialIndex].kg.toFixed(3);

});

localStorage.setItem("stock",JSON.stringify(stock));

localStorage.setItem("entries",JSON.stringify(entries));

}


// DOWNLOAD CSV

function downloadCSV(){

let csv = [];

csv.push([

"Date",
"Material",
"Type",
"IN KG",
"OUT Pieces",
"OUT KG",
"Balance Pieces",
"Balance KG"

]);

entries.forEach(e=>{

csv.push([

e.date,
e.material,
e.type,
e.inKg,
e.outPieces,
e.outKg,
e.balancePieces,
e.balanceKg

]);

});

let csvContent = "data:text/csv;charset=utf-8,";

csv.forEach(row=>{

csvContent += row.join(",") + "\n";

});

let encodedUri = encodeURI(csvContent);

let link = document.createElement("a");

link.setAttribute("href",encodedUri);

link.setAttribute("download","material_stock.csv");

document.body.appendChild(link);

link.click();

}

</script>

</body>
</html>
