<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Material Stock Management</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,button{
    padding:10px;
    margin:5px;
    width:100%;
    max-width:320px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.deleteBtn{
    background:red;
}

.editBtn{
    background:orange;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
    font-size:14px;
}

th{
    background:#007bff;
    color:white;
}

.stock{
    background:#d4edda;
    font-weight:bold;
}

.materialCard{
    background:#fff3cd;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

</style>

</head>

<body>

<h1>Advanced Material Stock Management</h1>

<!-- ADD MATERIAL -->

<div class="container">

<h2>Add Material</h2>

<input type="text"
id="materialName"
placeholder="Material Name">

<input type="number"
step="0.001"
id="sheetWeight"
placeholder="Sheet Weight">

<input type="number"
step="0.001"
id="grossWeight"
placeholder="Gross Weight Per Piece">

<input type="number"
step="0.001"
id="netWeight"
placeholder="Net Weight Per Piece">

<button onclick="addMaterial()">

Add Material

</button>

</div>

<!-- MATERIAL DETAILS -->

<div class="container">

<h2>Material Master</h2>

<div id="materialList"></div>

</div>

<!-- ENTRY -->

<div class="container">

<h2>Stock Entry</h2>

<input type="date" id="date">

<select id="material"></select>

<select id="type">

<option value="IN">
Material IN (KG)
</option>

<option value="OUT">
Material OUT (Pieces)
</option>

</select>

<input type="number"
id="value"
placeholder="Enter Value">

<button onclick="addEntry()">

Add Entry

</button>

<button onclick="downloadCSV()">

Download CSV

</button>

</div>

<!-- STOCK SUMMARY -->

<div class="container">

<h2>Current Stock</h2>

<div id="summary"></div>

</div>

<!-- TABLE -->

<div style="overflow-x:auto;">

<table>

<thead>

<tr>

<th>Date</th>
<th>Material</th>
<th>Type</th>
<th>IN KG</th>
<th>OUT PCS</th>
<th>OUT KG</th>
<th>Balance PCS</th>
<th>Balance KG</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="entryTable"></tbody>

</table>

</div>

<script>

// MATERIALS

let materials = JSON.parse(
localStorage.getItem("materials")
) || [];

// STOCK

let stock = JSON.parse(
localStorage.getItem("stock")
) || {};

// ENTRIES

let entries = JSON.parse(
localStorage.getItem("entries")
) || [];

// AUTO STOCK CREATE

materials.forEach((m,index)=>{

if(!stock[index]){

stock[index] = {
kg:0,
pieces:0
};

}

});

// TODAY DATE

document.getElementById("date")
.valueAsDate = new Date();

// LOAD

loadMaterials();
loadMaterialList();
loadTable();


// LOAD DROPDOWN

function loadMaterials(){

let dropdown =
document.getElementById("material");

dropdown.innerHTML = "";

materials.forEach((m,index)=>{

dropdown.innerHTML += `

<option value="${index}">

${m.name}

</option>

`;

});

}


// ADD MATERIAL

function addMaterial(){

let name =
document.getElementById(
"materialName"
).value;

let sheetWeight =
parseFloat(
document.getElementById(
"sheetWeight"
).value
);

let grossWeight =
parseFloat(
document.getElementById(
"grossWeight"
).value
);

let netWeight =
parseFloat(
document.getElementById(
"netWeight"
).value
);

if(name==""){

alert("Enter Material Name");
return;

}

if(!sheetWeight || !grossWeight || !netWeight){

alert("Fill All Details");
return;

}

materials.push({

name:name,
sheetWeight:sheetWeight,
grossWeight:grossWeight,
netWeight:netWeight

});

stock[materials.length-1] = {

kg:0,
pieces:0

};

localStorage.setItem(
"materials",
JSON.stringify(materials)
);

localStorage.setItem(
"stock",
JSON.stringify(stock)
);

loadMaterials();
loadMaterialList();

document.getElementById(
"materialName"
).value="";

document.getElementById(
"sheetWeight"
).value="";

document.getElementById(
"grossWeight"
).value="";

document.getElementById(
"netWeight"
).value="";

alert("Material Added");

}


// MATERIAL LIST

function loadMaterialList(){

let list =
document.getElementById(
"materialList"
);

list.innerHTML = "";

materials.forEach((m,index)=>{

list.innerHTML += `

<div class="materialCard">

<b>${m.name}</b><br><br>

Sheet Weight :
${m.sheetWeight}<br>

Gross Weight :
${m.grossWeight}<br>

Net Weight :
${m.netWeight}<br><br>

<button class="deleteBtn"
onclick="deleteMaterial(${index})">

Delete Material

</button>

</div>

`;

});

}


// DELETE MATERIAL

function deleteMaterial(index){

let confirmDelete =
confirm(
"Delete Material ?"
);

if(confirmDelete){

materials.splice(index,1);

delete stock[index];

localStorage.setItem(
"materials",
JSON.stringify(materials)
);

localStorage.setItem(
"stock",
JSON.stringify(stock)
);

loadMaterials();
loadMaterialList();

}

}


// ADD ENTRY

function addEntry(){

let date =
document.getElementById(
"date"
).value;

let materialIndex =
document.getElementById(
"material"
).value;

let type =
document.getElementById(
"type"
).value;

let value =
parseFloat(
document.getElementById(
"value"
).value
);

if(date==""){

alert("Select Date");
return;

}

if(!value || value<=0){

alert("Enter Valid Value");
return;

}

let material =
materials[materialIndex];

let inKg = 0;
let outPieces = 0;
let outKg = 0;

if(type=="IN"){

inKg = value;

let pieces =
Math.floor(
inKg /
material.netWeight
);

stock[materialIndex].kg +=
inKg;

stock[materialIndex].pieces +=
pieces;

}

else{

outPieces = value;

outKg =
outPieces *
material.netWeight;

if(
stock[materialIndex].pieces
< outPieces
){

alert("Not Enough Stock");
return;

}

stock[materialIndex].kg -=
outKg;

stock[materialIndex].pieces -=
outPieces;

}

let entry = {

date:date,
material:material.name,
type:type,
inKg:inKg.toFixed(3),
outPieces:outPieces,
outKg:outKg.toFixed(3),
balancePieces:
stock[materialIndex].pieces,

balanceKg:
stock[materialIndex].kg
.toFixed(3)

};

entries.push(entry);

localStorage.setItem(
"entries",
JSON.stringify(entries)
);

localStorage.setItem(
"stock",
JSON.stringify(stock)
);

loadTable();

document.getElementById(
"value"
).value="";

}


// LOAD TABLE

function loadTable(){

let table =
document.getElementById(
"entryTable"
);

table.innerHTML = "";

entries.forEach((e,index)=>{

table.innerHTML += `

<tr>

<td>${e.date}</td>
<td>${e.material}</td>
<td>${e.type}</td>
<td>${e.inKg}</td>
<td>${e.outPieces}</td>
<td>${e.outKg}</td>

<td class="stock">

${e.balancePieces}

</td>

<td class="stock">

${e.balanceKg}

</td>

<td>

<button class="deleteBtn"
onclick="deleteEntry(${index})">

Delete

</button>

</td>

</tr>

`;

});

loadSummary();

}


// SUMMARY

function loadSummary(){

let summary =
document.getElementById(
"summary"
);

summary.innerHTML = "";

materials.forEach((m,index)=>{

summary.innerHTML += `

<div class="materialCard">

<b>${m.name}</b><br><br>

Balance Pieces :
${stock[index]?.pieces || 0}<br>

Balance KG :
${stock[index]?.kg?.toFixed(3) || 0}<br><br>

Sheet Weight :
${m.sheetWeight}<br>

Gross Weight :
${m.grossWeight}<br>

Net Weight :
${m.netWeight}

</div>

`;

});

}


// DELETE ENTRY

function deleteEntry(index){

let confirmDelete =
confirm(
"Delete Entry ?"
);

if(confirmDelete){

entries.splice(index,1);

recalculateStock();

loadTable();

}

}


// RECALCULATE

function recalculateStock(){

stock = {};

materials.forEach((m,index)=>{

stock[index] = {

kg:0,
pieces:0

};

});

entries.forEach(e=>{

let materialIndex =
materials.findIndex(
m => m.name === e.material
);

if(materialIndex==-1)
return;

let material =
materials[materialIndex];

if(e.type=="IN"){

stock[materialIndex].kg +=
parseFloat(e.inKg);

stock[materialIndex].pieces +=
Math.floor(
parseFloat(e.inKg)
/ material.netWeight
);

}

else{

stock[materialIndex].kg -=
parseFloat(e.outKg);

stock[materialIndex].pieces -=
parseFloat(e.outPieces);

}

e.balancePieces =
stock[materialIndex].pieces;

e.balanceKg =
stock[materialIndex].kg
.toFixed(3);

});

localStorage.setItem(
"stock",
JSON.stringify(stock)
);

localStorage.setItem(
"entries",
JSON.stringify(entries)
);

}


// DOWNLOAD CSV

function downloadCSV(){

let csv = [];

csv.push([

"Date",
"Material",
"Type",
"IN KG",
"OUT PCS",
"OUT KG",
"Balance PCS",
"Balance KG"

]);

entries.forEach(e=>{

csv.push([

e.date,
e.material,
e.type,
e.inKg,
e.outPieces,
e.outKg,
e.balancePieces,
e.balanceKg

]);

});

let csvContent =
"data:text/csv;charset=utf-8,";

csv.forEach(row=>{

csvContent +=
row.join(",") + "\n";

});

let encodedUri =
encodeURI(csvContent);

let link =
document.createElement("a");

link.setAttribute(
"href",
encodedUri
);

link.setAttribute(
"download",
"material_stock.csv"
);

document.body.appendChild(link);

link.click();

}

</script>

</body>
</html>
